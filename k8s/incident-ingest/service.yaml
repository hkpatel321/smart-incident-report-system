# ============================================
# Service for Incident Ingest Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: incident-ingest-service
  namespace: smart-incident
  labels:
    app: incident-ingest-service
    app.kubernetes.io/name: incident-ingest-service
    app.kubernetes.io/component: service
spec:
  type: NodePort # Use NodePort for Minikube access
  selector:
    app: incident-ingest-service
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30081 # Access via minikube ip:30081

---
# ============================================
# ClusterIP Service (internal only)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: incident-ingest-internal
  namespace: smart-incident
  labels:
    app: incident-ingest-service
spec:
  type: ClusterIP
  selector:
    app: incident-ingest-service
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 8081
