# ============================================
# Kustomization for Incident Ingest Service
# Apply with: kubectl apply -k k8s/incident-ingest/
# ============================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smart-incident

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      environment: development
