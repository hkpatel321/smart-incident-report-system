# ========================================
# Incident Processor Service Configuration
# ========================================

spring.application.name=incident-processor-service
server.port=8082

# ========================================
# PostgreSQL Database
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/incident_db
spring.datasource.username=incident_user
spring.datasource.password=incident_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=processor

# ========================================
# Kafka Consumer
# ========================================
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=incident-processor-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ========================================
# Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========================================
# Logging
# ========================================
logging.level.com.smartincident=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# JWT Configuration
# ========================================
jwt.secret=${JWT_SECRET:SmartIncidentSuperSecretKey2026ProductionKeyMustBe256BitsMinimumXYZ1}
jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}
