# ========================================
# AI RAG Service Configuration
# ========================================

spring.application.name=ai-rag-service
server.port=8084

# ========================================
# PostgreSQL + pgvector
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/incident_db
spring.datasource.username=incident_user
spring.datasource.password=incident_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=ai_rag

# ========================================
# Gemini API Configuration
# ========================================
gemini.api.key=${GEMINI_API_KEY:AIzaSyC5kWXuc9Hpwgjt5eyHNfGmcrZHSp76cFw}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.model.embedding=models/gemini-embedding-001
gemini.model.embedding.dimensions=768
gemini.model.generation=models/gemini-2.5-flash

# ========================================
# RAG Configuration
# ========================================
rag.retrieval.top-k=5
rag.retrieval.min-similarity=0.5

# ========================================
# Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========================================
# Logging
# ========================================
server.error.include-message=always
server.error.include-stacktrace=always
logging.level.com.smartincident=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
