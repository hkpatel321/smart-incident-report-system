# ========================================
# Notification Service Configuration
# ========================================

spring.application.name=notification-service
server.port=8083

# ========================================
# PostgreSQL
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/incident_db
spring.datasource.username=incident_user
spring.datasource.password=incident_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=notification

# ========================================
# Kafka
# ========================================
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ========================================
# Mail (SMTP)
# Override via environment variables in production/docker.
# Set notification.mail.enabled=false to disable actual sending
# and only log (useful for local dev without an SMTP server).
# ========================================
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification-specific settings
notification.mail.from=${MAIL_FROM:noreply@smartincident.local}
notification.oncall.email=${ONCALL_EMAIL:oncall@smartincident.local}
notification.mail.enabled=${MAIL_ENABLED:false}

# ========================================
# Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========================================
# Logging
# ========================================
server.error.include-message=always
logging.level.com.smartincident=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
