version: "3.8"

services:
  # ===========================================
  # INFRASTRUCTURE SERVICES
  # ===========================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: incident-postgres
    environment:
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_pass
      POSTGRES_DB: incident_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/postgres/pgvector-setup.sql:/docker-entrypoint-initdb.d/02-pgvector.sql
    networks:
      - incident-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: incident-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - incident-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: incident-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - incident-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: incident-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: incident-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - incident-network

  # ===========================================
  # APPLICATION SERVICES
  # ===========================================

  incident-ingest-service:
    build:
      context: ./services/incident-ingest-service
      dockerfile: Dockerfile
    container_name: incident-ingest-service
    hostname: incident-ingest-service
    ports:
      - "8081:8081"
    environment:
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS: kafka:9092
      # Server
      SERVER_PORT: 8081
      # Logging
      LOGGING_LEVEL_COM_SMARTINCIDENT: INFO
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - incident-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/api/incidents/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  incident-processor-service:
    build:
      context: ./services/incident-processor-service
      dockerfile: Dockerfile
    container_name: incident-processor-service
    hostname: incident-processor-service
    ports:
      - "8082:8082"
    environment:
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: incident-processor-group
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incident_db
      SPRING_DATASOURCE_USERNAME: incident_user
      SPRING_DATASOURCE_PASSWORD: incident_pass
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: processor
      # JWT
      JWT_SECRET: ${JWT_SECRET:-SmartIncidentSuperSecretKey2026ProductionKeyMustBe256BitsMinimumXYZ1}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS:-86400000}
      # Server
      SERVER_PORT: 8082
      # Logging
      LOGGING_LEVEL_COM_SMARTINCIDENT: INFO
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - incident-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ai-rag-service:
    build:
      context: ./services/ai-rag-service
      dockerfile: Dockerfile
    container_name: ai-rag-service
    hostname: ai-rag-service
    ports:
      - "8084:8084"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incident_db
      SPRING_DATASOURCE_USERNAME: incident_user
      SPRING_DATASOURCE_PASSWORD: incident_pass
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ai_rag
      # Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-api-key-here}
      # RAG Config
      RAG_RETRIEVAL_TOP_K: 5
      RAG_RETRIEVAL_MIN_SIMILARITY: 0.5
      # Server
      SERVER_PORT: 8084
      # Logging
      LOGGING_LEVEL_COM_SMARTINCIDENT: INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - incident-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/api/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    hostname: notification-service
    ports:
      - "8083:8083"
    environment:
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: notification-service-group
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incident_db
      SPRING_DATASOURCE_USERNAME: incident_user
      SPRING_DATASOURCE_PASSWORD: incident_pass
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: notification
      # Mail (set MAIL_ENABLED=true and supply credentials to activate real sending)
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@smartincident.local}
      ONCALL_EMAIL: ${ONCALL_EMAIL:-oncall@smartincident.local}
      # Server
      SERVER_PORT: 8083
      # Logging
      LOGGING_LEVEL_COM_SMARTINCIDENT: INFO
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - incident-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/api/notifications/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # FRONTEND
  # ===========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: incident-frontend
    hostname: frontend
    ports:
      - "3000:80"
    depends_on:
      - incident-ingest-service
      - incident-processor-service
      - ai-rag-service
      - notification-service
    networks:
      - incident-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===========================================
# NETWORKS
# ===========================================
networks:
  incident-network:
    driver: bridge
    name: smart-incident-network

# ===========================================
# VOLUMES
# ===========================================
volumes:
  postgres_data:
    name: incident-postgres-data
